# Auto-generated by Cimas: Do not edit it manually!
# See https://github.com/metanorma/cimas
name: release

permissions:
  contents: write
  packages: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      next_version:
        description: |
          Next release version. Possible values: x.y.z, major, minor, patch or pre|rc|etc
        required: true
        default: "skip"
  push:
    tags:
      - v*
  repository_dispatch:
    types: [do-release]

jobs:
  release:
    uses: metanorma/ci/.github/workflows/rubygems-release.yml@main
    with:
      next_version: ${{ github.event.inputs.next_version }}
    secrets:
      rubygems-api-key: ${{ secrets.FONTIST_CI_RUBYGEMS_API_KEY }}
      # NOTE: GITHUB_TOKEN is intentionally NOT passed as pat_token. The
      # metanorma/ci release workflow checks `secrets.pat_token == ''` to
      # decide between the gated chain (bump→tag→test→do-release→publish)
      # and immediate publish. GITHUB_TOKEN cannot trigger downstream
      # workflow runs (GitHub design), so the gated chain silently
      # completes with SHOULD_PUBLISH=false and the gem never publishes.
      # Leaving pat_token empty takes the immediate-publish path instead.

